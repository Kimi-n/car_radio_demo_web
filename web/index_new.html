<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>车机网络电台 - 修复版</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* 全局样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            color: #333;
        }

        /* 应用容器 */
        .app-container {
            max-width: 600px;
            margin: 0 auto;
            background-color: #fff;
            min-height: 100vh;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        /* 标题栏 */
        .app-header {
            background-color: #333;
            color: #fff;
            padding: 20px;
            text-align: center;
        }

        .app-header h1 {
            font-size: 24px;
        }

        /* 主内容区域 */
        .app-main {
            padding: 20px;
        }

        /* 音频信息区域 */
        .audio-info {
            text-align: center;
            margin-bottom: 30px;
        }

        .audio-info h2 {
            font-size: 20px;
            margin-bottom: 10px;
        }

        .audio-info p {
            color: #666;
            margin-bottom: 20px;
        }

        /* 进度条 */
        .progress-container {
            margin: 20px 0;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            border-radius: 4px;
            background: #ddd;
            outline: none;
            -webkit-appearance: none;
        }

        .progress-bar::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #333;
            cursor: pointer;
        }

        .progress-bar::-moz-range-thumb {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #333;
            cursor: pointer;
            border: none;
        }

        .time-display {
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
            font-size: 14px;
            color: #666;
        }

        /* 功能按钮区域 */
        .function-buttons {
            display: flex;
            justify-content: space-around;
            margin: 30px 0;
        }

        .function-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: none;
            border: none;
            cursor: pointer;
            padding: 10px;
        }

        .function-btn i {
            font-size: 24px;
            margin-bottom: 5px;
            color: #333;
        }

        .function-btn span {
            font-size: 12px;
            color: #666;
        }

        /* 音频文字容器 */
        .audio-text-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            color: #fff;
            display: none;
            z-index: 1000;
        }

        .audio-text-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            border-bottom: 1px solid #444;
        }

        .audio-text-header h3 {
            font-size: 18px;
        }

        .close-btn {
            background: none;
            border: none;
            color: #fff;
            font-size: 24px;
            cursor: pointer;
        }

        .audio-text-content {
            padding: 20px;
            height: calc(100% - 70px);
            overflow-y: auto;
            line-height: 1.6;
        }

        /* 语音控制提示 */
        .voice-control-hint {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: rgba(0, 0, 0, 0.9);
            color: #fff;
            padding: 30px;
            border-radius: 10px;
            display: none;
            flex-direction: column;
            align-items: center;
            z-index: 1000;
        }

        .voice-control-hint i {
            font-size: 48px;
            margin-bottom: 15px;
        }

        /* 播放控制区域 */
        .app-footer {
            background-color: #333;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .control-btn {
            background: none;
            border: none;
            color: #fff;
            font-size: 24px;
            margin: 0 20px;
            cursor: pointer;
        }

        .play-btn {
            font-size: 32px;
        }

        /* 模态框 */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgba(0, 0, 0, 0.4);
        }

        .modal-content {
            background-color: #fefefe;
            margin: 15% auto;
            padding: 20px;
            border: 1px solid #888;
            width: 80%;
            max-width: 500px;
            border-radius: 10px;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid #ddd;
        }

        .modal-header h3 {
            margin: 0;
        }

        /* 标签页样式 */
        .playlist-tabs {
            margin-top: 20px;
        }

        .tab-buttons {
            display: flex;
            border-bottom: 1px solid #ddd;
            margin-bottom: 20px;
        }

        .tab-button {
            padding: 10px 15px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 14px;
            color: #666;
            border-bottom: 2px solid transparent;
        }

        .tab-button.active {
            color: #333;
            border-bottom-color: #333;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* 音频列表 */
        .audio-list {
            list-style: none;
        }

        .audio-item {
            padding: 15px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
        }

        .audio-item:hover {
            background-color: #f5f5f5;
        }

        .audio-item.active {
            background-color: #e3f2fd;
        }

        .audio-item-info h4 {
            margin-bottom: 5px;
            font-size: 14px;
        }

        .audio-item-info p {
            margin: 0;
            font-size: 12px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- 标题栏 -->
        <header class="app-header">
            <h1>车机网络电台</h1>
        </header>

        <!-- 主内容区域 -->
        <main class="app-main">
            <!-- 音频信息区域 -->
            <div class="audio-info">
                <h2 id="audio-title">音频标题</h2>
                <p id="audio-subtitle">音频副标题</p>

                <!-- 音频进度条 -->
                <div class="progress-container">
                    <input type="range" id="progress-bar" class="progress-bar" min="0" max="100" value="0">
                    <div class="time-display">
                        <span id="current-time">00:00</span>
                        <span id="total-time">00:00</span>
                    </div>
                </div>
            </div>

            <!-- 功能按钮区域 -->
            <div class="function-buttons">
                <button id="btn-playlist" class="function-btn">
                    <i class="fas fa-list"></i>
                    <span>播放列表</span>
                </button>
                <button id="btn-audio-text" class="function-btn">
                    <i class="fas fa-file-alt"></i>
                    <span>音频文字</span>
                </button>
                <button id="btn-voice-control" class="function-btn">
                    <i class="fas fa-microphone"></i>
                    <span>语音控制</span>
                </button>
            </div>

            <!-- 音频文字显示区域 -->
            <div id="audio-text-container" class="audio-text-container">
                <div class="audio-text-header">
                    <h3>音频文字</h3>
                    <button id="close-audio-text" class="close-btn">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
                <div id="audio-text-content" class="audio-text-content">
                    音频文字内容将显示在这里
                </div>
            </div>

            <!-- 语音控制提示 -->
            <div id="voice-control-hint" class="voice-control-hint">
                <i class="fas fa-microphone"></i>
                <span>请说出您的指令...</span>
            </div>
        </main>

        <!-- 播放控制区域 -->
        <footer class="app-footer">
            <button id="btn-previous" class="control-btn">
                <i class="fas fa-step-backward"></i>
            </button>
            <button id="btn-play-pause" class="control-btn play-btn">
                <i class="fas fa-play"></i>
            </button>
            <button id="btn-next" class="control-btn">
                <i class="fas fa-step-forward"></i>
            </button>
        </footer>
    </div>

    <!-- 播放列表模态框 -->
    <div id="playlist-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>播放列表</h3>
                <button id="close-playlist" class="close-btn">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="playlist-tabs">
                <div id="tab-buttons" class="tab-buttons">
                    <!-- 标签按钮将动态添加 -->
                </div>
                <div id="tab-contents" class="tab-contents">
                    <!-- 标签内容将动态添加 -->
                </div>
            </div>
        </div>
    </div>

    <script>
        // 全局变量
        let audioPlayer = null;
        let progressTimer = null;
        let lastUpdateTime = 0;

        // 页面加载完成后初始化
        window.onload = function() {
            // 初始化音频播放器
            audioPlayer = new AudioPlayer();
            
            // 点击模态框外部关闭模态框
            window.onclick = function(event) {
                const modal = document.getElementById('playlist-modal');
                if (event.target === modal) {
                    modal.style.display = 'none';
                }
            };
            
            // 开始进度更新
            startProgressUpdate();
        };

        // 开始进度更新
        function startProgressUpdate() {
            // 清除旧定时器
            if (progressTimer) {
                clearInterval(progressTimer);
                progressTimer = null;
            }
            
            // 设置新定时器，每2000毫秒执行一次（确保播放速度正常）
            progressTimer = setInterval(function() {
                // 检查是否正在播放
                if (audioPlayer && audioPlayer.isPlaying) {
                    // 获取进度条元素
                    const progressBar = document.getElementById('progress-bar');
                    if (progressBar) {
                        // 获取当前进度
                        const currentProgress = parseFloat(progressBar.value);
                        
                        // 计算新进度（每2秒增加1%，确保播放速度正常）
                        let newProgress = currentProgress + 1;
                        
                        // 检查是否播放完成
                        if (newProgress > 100) {
                            // 切换到下一首
                            audioPlayer.playNext();
                            newProgress = 0;
                        }
                        
                        // 更新进度条
                        progressBar.value = newProgress;
                        
                        // 更新时间显示
                        const playTime = Math.floor((newProgress / 100) * 300); // 5分钟
                        const totalTime = 300;
                        
                        const currentTimeEl = document.getElementById('current-time');
                        const totalTimeEl = document.getElementById('total-time');
                        
                        if (currentTimeEl && totalTimeEl) {
                            currentTimeEl.textContent = formatTime(playTime);
                            totalTimeEl.textContent = formatTime(totalTime);
                        }
                    }
                }
            }, 2000); // 每2秒执行一次，确保播放速度正常
        }

        // 格式化时间
        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return (mins < 10 ? '0' + mins : mins) + ':' + (secs < 10 ? '0' + secs : secs);
        }

        // 音频播放器类
        class AudioPlayer {
            constructor() {
                this.audioElement = new Audio();
                this.currentColumnIndex = 0;
                this.currentItemIndex = 0;
                this.isPlaying = false;
                this.audioData = this.loadAudioList();
                this.setupEventListeners();
                this.updatePlaylistUI();
            }

            loadAudioList() {

                                    text: '今天是2026年2月11日，星期二。欢迎收听早间新闻播报。首先来看国际新闻...'
                                },
                                {
                                    id: 'news3',
                                    title: '2026年2月10日早间新闻',
                                    subtitle: '新闻播客',
                                    url: 'https://example.com/audio/news3.mp3',
                                    text: '今天是2026年2月10日，星期一。欢迎收听早间新闻播报。首先来看财经新闻...'
                                }

                                },
                                {

                                },

                                }

                        },
                        {
                            id: 'sports',
                            name: '赛事集锦',
                            items: [
                                {

                                    title: '2026年世界杯预选赛 中国VS日本',
                                    subtitle: '体育赛事',
                                    url: 'https://example.com/audio/sports1.mp3',
                                    text: '2026年世界杯预选赛亚洲区12强赛，中国国家队主场对阵日本国家队。比赛在广州天河体育场举行...'
                                },
                                {

                                    text: '2026年NBA全明星赛在芝加哥联合中心球馆举行。东西部全明星阵容豪华，比赛精彩绝伦...'

                                {

                                    text: '中超联赛第5轮，广州恒大主场以3比0战胜了上海上港，阿兰梅开二度...'
                                }
                            ]
                        }
                    ]
                };
            }

            setupEventListeners() {
                // 控制按钮事件
                document.getElementById('btn-play-pause').addEventListener('click', () => this.togglePlayPause());
                document.getElementById('btn-previous').addEventListener('click', () => this.playPrevious());
                document.getElementById('btn-next').addEventListener('click', () => this.playNext());

                // 进度条事件
                document.getElementById('progress-bar').addEventListener('input', (e) => this.seek(e.target.value));

                // 功能按钮事件
                document.getElementById('btn-playlist').addEventListener('click', () => this.showPlaylist());
                document.getElementById('btn-audio-text').addEventListener('click', () => this.showAudioText());
                document.getElementById('btn-voice-control').addEventListener('click', () => this.startVoiceControl());

                // 关闭按钮事件
                document.getElementById('close-audio-text').addEventListener('click', () => this.hideAudioText());
                document.getElementById('close-playlist').addEventListener('click', () => this.hidePlaylist());

                // 初始化播放第一首音频
                this.playAudio(this.currentColumnIndex, this.currentItemIndex);
            }

            playAudio(columnIndex, itemIndex) {
                if (columnIndex >= 0 && columnIndex < this.audioData.columns.length) {
                    const column = this.audioData.columns[columnIndex];
                    if (itemIndex >= 0 && itemIndex < column.items.length) {
                        this.currentColumnIndex = columnIndex;
                        this.currentItemIndex = itemIndex;
                        const audioItem = column.items[itemIndex];
                        this.audioElement.src = audioItem.url;
                        this.audioElement.load();
                        this.updateAudioInfo(audioItem);
                        this.updatePlaylistUI();
                        // 重置进度条和时间显示
                        document.getElementById('progress-bar').value = 0;
                        document.getElementById('current-time').textContent = '00:00';
                        document.getElementById('total-time').textContent = '00:00';
                    }
                }
            }

            updateAudioInfo(audioItem) {
                document.getElementById('audio-title').textContent = audioItem.title;
                document.getElementById('audio-subtitle').textContent = audioItem.subtitle;
                document.getElementById('audio-text-content').textContent = audioItem.text;
            }

            updatePlaylistUI() {
                const tabButtonsContainer = document.getElementById('tab-buttons');
                const tabContentsContainer = document.getElementById('tab-contents');
                
                // 清空现有内容
                tabButtonsContainer.innerHTML = '';
                tabContentsContainer.innerHTML = '';
                
                // 为每个专栏创建标签按钮和内容
                this.audioData.columns.forEach((column, columnIndex) => {
                    // 创建标签按钮
                    const tabButton = document.createElement('button');
                    tabButton.className = 'tab-button';
                    tabButton.textContent = column.name;
                    tabButton.dataset.columnIndex = columnIndex;
                    
                    // 设置默认激活的标签
                    if (columnIndex === this.currentColumnIndex) {
                        tabButton.classList.add('active');
                    }
                    
                    // 添加点击事件
                    tabButton.addEventListener('click', () => {
                        // 切换标签激活状态
                        document.querySelectorAll('.tab-button').forEach(btn => btn.classList.remove('active'));
                        tabButton.classList.add('active');
                        
                        // 显示对应专栏的内容
                        document.querySelectorAll('.tab-content').forEach(content => content.style.display = 'none');
                        document.querySelector(`.tab-content[data-column-index="${columnIndex}"]`).style.display = 'block';
                    });
                    
                    tabButtonsContainer.appendChild(tabButton);
                    
                    // 创建标签内容
                    const tabContent = document.createElement('div');
                    tabContent.className = 'tab-content';
                    tabContent.dataset.columnIndex = columnIndex;
                    
                    // 设置默认显示的内容
                    if (columnIndex === this.currentColumnIndex) {
                        tabContent.style.display = 'block';
                    } else {
                        tabContent.style.display = 'none';
                    }
                    
                    // 创建音频列表
                    const audioList = document.createElement('ul');
                    audioList.className = 'audio-list';
                    
                    column.items.forEach((item, itemIndex) => {
                        const listItem = document.createElement('li');
                        listItem.className = 'audio-item';
                        
                        // 设置当前播放项的样式
                        if (columnIndex === this.currentColumnIndex && itemIndex === this.currentItemIndex) {
                            listItem.classList.add('active');
                        }
                        
                        // 添加点击事件
                        listItem.addEventListener('click', () => {
                            this.playAudio(columnIndex, itemIndex);
                            if (this.isPlaying) {
                                this.play();
                            }
                        });
                        
                        // 创建音频信息
                        const audioInfo = document.createElement('div');
                        audioInfo.className = 'audio-item-info';
                        
                        const audioTitle = document.createElement('h4');
                        audioTitle.textContent = item.title;
                        
                        const audioSubtitle = document.createElement('p');
                        audioSubtitle.textContent = item.subtitle;
                        
                        audioInfo.appendChild(audioTitle);
                        audioInfo.appendChild(audioSubtitle);
                        
                        listItem.appendChild(audioInfo);
                        audioList.appendChild(listItem);
                    });
                    
                    tabContent.appendChild(audioList);
                    tabContentsContainer.appendChild(tabContent);
                });
            }

            togglePlayPause() {
                if (this.isPlaying) {
                    this.pause();
                } else {
                    this.play();
                }
            }

            play() {
                this.audioElement.play().catch(error => {
                    console.error('播放失败:', error);
                });
                this.isPlaying = true;
                this.updatePlayPauseIcon();
            }

            pause() {
                this.audioElement.pause();
                this.isPlaying = false;
                this.updatePlayPauseIcon();
            }

            playPrevious() {
                const currentColumn = this.audioData.columns[this.currentColumnIndex];
                if (this.currentItemIndex === 0) {
                    // 如果是当前专栏的第一首，切换到上一个专栏的最后一首
                    const newColumnIndex = (this.currentColumnIndex - 1 + this.audioData.columns.length) % this.audioData.columns.length;
                    const newColumn = this.audioData.columns[newColumnIndex];
                    const newItemIndex = newColumn.items.length - 1;
                    this.playAudio(newColumnIndex, newItemIndex);
                } else {
                    // 否则在当前专栏内切换到上一首
                    const newItemIndex = this.currentItemIndex - 1;
                    this.playAudio(this.currentColumnIndex, newItemIndex);
                }
                if (this.isPlaying) {
                    this.play();
                }
            }

            playNext() {
                const currentColumn = this.audioData.columns[this.currentColumnIndex];
                if (this.currentItemIndex === currentColumn.items.length - 1) {
                    // 如果是当前专栏的最后一首，切换到下一个专栏的第一首
                    const newColumnIndex = (this.currentColumnIndex + 1) % this.audioData.columns.length;
                    const newItemIndex = 0;
                    this.playAudio(newColumnIndex, newItemIndex);
                } else {
                    // 否则在当前专栏内切换到下一首
                    const newItemIndex = this.currentItemIndex + 1;
                    this.playAudio(this.currentColumnIndex, newItemIndex);
                }
                if (this.isPlaying) {
                    this.play();
                }
            }

            seek(value) {
                // 对于模拟音频，直接更新进度
                const currentTime = Math.floor((value / 100) * 300); // 假设每首歌5分钟
                const totalTime = 300;
                document.getElementById('current-time').textContent = this.formatTime(currentTime);
                document.getElementById('total-time').textContent = this.formatTime(totalTime);
                
                // 同时更新实际音频的currentTime（如果有）
                if (this.audioElement.duration) {
                    const seekTime = this.audioElement.duration * (value / 100);
                    this.audioElement.currentTime = seekTime;
                }
            }

            formatTime(seconds) {
                const mins = Math.floor(seconds / 60);
                const secs = Math.floor(seconds % 60);
                return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            }

            updatePlayPauseIcon() {
                const playPauseBtn = document.getElementById('btn-play-pause');
                const icon = playPauseBtn.querySelector('i');
                
                if (this.isPlaying) {
                    icon.className = 'fas fa-pause';
                } else {
                    icon.className = 'fas fa-play';
                }
            }

            showPlaylist() {
                const playlistModal = document.getElementById('playlist-modal');
                playlistModal.style.display = 'block';
            }

            hidePlaylist() {
                const playlistModal = document.getElementById('playlist-modal');
                playlistModal.style.display = 'none';
            }

            showAudioText() {
                const audioTextContainer = document.getElementById('audio-text-container');
                audioTextContainer.style.display = 'block';
            }

            hideAudioText() {
                const audioTextContainer = document.getElementById('audio-text-container');
                audioTextContainer.style.display = 'none';
            }

            startVoiceControl() {
                // 模拟语音控制
                const voiceControlHint = document.getElementById('voice-control-hint');
                voiceControlHint.style.display = 'block';
                
                // 3秒后隐藏提示
                setTimeout(() => {
                    voiceControlHint.style.display = 'none';
                }, 3000);
            }
        }
    </script>
</body>
</html>
