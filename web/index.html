<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>车载智能电台</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-container">
        <!-- 左侧：内容列表 -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <i class="fas fa-broadcast-tower"></i>
                    <span>智能电台</span>
                </div>
            </div>

            <!-- 栏目/分类 tab 直接展示 -->
            <div id="tab-buttons" class="channel-tabs"></div>
            <div id="tab-contents" class="channel-contents"></div>
        </aside>

        <!-- 右侧：播放器 -->
        <main class="player-main">
            <!-- 当前播放信息 -->
            <div class="now-playing">
                <div class="now-playing-label">
                    <i class="fas fa-signal"></i>
                    <span>正在播放</span>
                </div>
                <h1 id="audio-title">等待加载...</h1>
                <p id="audio-subtitle" class="source-label"></p>
            </div>

            <!-- 播放控制 -->
            <div class="player-controls">
                <div class="progress-container">
                    <span id="current-time" class="time-label">00:00</span>
                    <input type="range" id="progress-bar" class="progress-bar" min="0" max="100" value="0">
                    <span id="total-time" class="time-label">--:--</span>
                </div>

                <div class="control-buttons">
                    <button id="btn-previous" class="ctrl-btn" title="上一首">
                        <i class="fas fa-backward-step"></i>
                    </button>
                    <button id="btn-play-pause" class="ctrl-btn ctrl-btn-play" title="播放/暂停">
                        <i class="fas fa-play"></i>
                    </button>
                    <button id="btn-next" class="ctrl-btn" title="下一首">
                        <i class="fas fa-forward-step"></i>
                    </button>
                </div>
            </div>

            <!-- 搜索/语音输入 -->
            <div class="query-bar">
                <i class="fas fa-microphone query-bar-icon" id="btn-voice-input" title="语音输入"></i>
                <input type="text" id="query-input" class="query-input" placeholder="输入你想听的内容...">
                <button id="btn-query-send" class="query-send-btn" title="发送">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>

            <!-- 内容正文 -->
            <div class="content-panel">
                <div class="content-panel-header">
                    <i class="fas fa-align-left"></i>
                    <span>内容详情</span>
                </div>
                <div id="audio-text-content" class="content-body">
                    <p class="subtitle-paragraph">内容将在此处显示</p>
                </div>
            </div>
        </main>
    </div>

    <!-- 播放列表模态框（保留用于移动端） -->
    <div id="playlist-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>播放列表</h3>
                <button id="close-playlist" class="close-btn"><i class="fas fa-times"></i></button>
            </div>
        </div>
    </div>

    <!-- 语音控制提示 -->
    <div id="voice-control-hint" class="voice-hint">
        <i class="fas fa-microphone"></i>
        <span>请说出您的指令...</span>
    </div>

    <!-- 播放列表按钮（移动端） -->
    <button id="btn-playlist" class="mobile-playlist-btn">
        <i class="fas fa-list"></i>
    </button>
    <button id="btn-voice-control" class="mobile-voice-btn">
        <i class="fas fa-microphone"></i>
    </button>

    <script src="js/audioPlayer.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
