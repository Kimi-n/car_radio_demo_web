<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>车机网络电台 - 极简版</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* 全局样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            color: #333;
        }

        /* 应用容器 */
        .app-container {
            max-width: 600px;
            margin: 0 auto;
            background-color: #fff;
            min-height: 100vh;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        /* 标题栏 */
        .app-header {
            background-color: #333;
            color: #fff;
            padding: 20px;
            text-align: center;
        }

        .app-header h1 {
            font-size: 24px;
        }

        /* 主内容区域 */
        .app-main {
            padding: 20px;
        }

        /* 音频信息区域 */
        .audio-info {
            text-align: center;
            margin-bottom: 30px;
        }

        .audio-info h2 {
            font-size: 20px;
            margin-bottom: 10px;
        }

        .audio-info p {
            color: #666;
            margin-bottom: 20px;
        }

        /* 进度条 */
        .progress-container {
            margin: 20px 0;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            border-radius: 4px;
            background: #ddd;
            outline: none;
            -webkit-appearance: none;
        }

        .progress-bar::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #333;
            cursor: pointer;
        }

        .progress-bar::-moz-range-thumb {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #333;
            cursor: pointer;
            border: none;
        }

        .time-display {
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
            font-size: 14px;
            color: #666;
        }

        /* 播放控制区域 */
        .app-footer {
            background-color: #333;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .control-btn {
            background: none;
            border: none;
            color: #fff;
            font-size: 24px;
            margin: 0 20px;
            cursor: pointer;
        }

        .play-btn {
            font-size: 32px;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- 标题栏 -->
        <header class="app-header">
            <h1>车机网络电台</h1>
        </header>

        <!-- 主内容区域 -->
        <main class="app-main">
            <!-- 音频信息区域 -->
            <div class="audio-info">
                <h2 id="audio-title">2026年2月12日早间新闻</h2>
                <p id="audio-subtitle">新闻播客</p>

                <!-- 音频进度条 -->
                <div class="progress-container">
                    <input type="range" id="progress-bar" class="progress-bar" min="0" max="100" value="0">
                    <div class="time-display">
                        <span id="current-time">00:00</span>
                        <span id="total-time">05:00</span>
                    </div>
                </div>
            </div>
        </main>

        <!-- 播放控制区域 -->
        <footer class="app-footer">
            <button id="btn-previous" class="control-btn">
                <i class="fas fa-step-backward"></i>
            </button>
            <button id="btn-play-pause" class="control-btn play-btn">
                <i class="fas fa-play"></i>
            </button>
            <button id="btn-next" class="control-btn">
                <i class="fas fa-step-forward"></i>
            </button>
        </footer>
    </div>

    <script>
        // 全局变量
        let isPlaying = false;
        let progress = 0;
        let progressTimer = null;

        // 页面加载完成后初始化
        window.onload = function() {
            // 绑定事件监听器
            document.getElementById('btn-play-pause').addEventListener('click', togglePlayPause);
            document.getElementById('btn-previous').addEventListener('click', playPrevious);
            document.getElementById('btn-next').addEventListener('click', playNext);
            document.getElementById('progress-bar').addEventListener('input', seek);
        };

        // 切换播放/暂停
        function togglePlayPause() {
            isPlaying = !isPlaying;
            updatePlayPauseIcon();
            
            if (isPlaying) {
                startProgressUpdate();
            } else {
                stopProgressUpdate();
            }
        }

        // 更新播放/暂停图标
        function updatePlayPauseIcon() {
            const icon = document.querySelector('#btn-play-pause i');
            if (isPlaying) {
                icon.className = 'fas fa-pause';
            } else {
                icon.className = 'fas fa-play';
            }
        }

        // 开始进度更新
        function startProgressUpdate() {
            // 清除旧定时器
            if (progressTimer) {
                clearInterval(progressTimer);
                progressTimer = null;
            }
            
            // 设置新定时器，每3000毫秒执行一次（确保播放速度正常）
            progressTimer = setInterval(function() {
                // 增加进度
                progress += 1;
                if (progress > 100) {
                    progress = 0;
                    playNext();
                }
                
                // 更新进度条
                document.getElementById('progress-bar').value = progress;
                
                // 更新时间显示
                const currentTime = Math.floor((progress / 100) * 300); // 5分钟
                document.getElementById('current-time').textContent = formatTime(currentTime);
            }, 3000); // 每3秒执行一次，确保播放速度正常
        }

        // 停止进度更新
        function stopProgressUpdate() {
            if (progressTimer) {
                clearInterval(progressTimer);
                progressTimer = null;
            }
        }

        // 播放上一首
        function playPrevious() {
            // 重置进度
            progress = 0;
            document.getElementById('progress-bar').value = progress;
            document.getElementById('current-time').textContent = '00:00';
            
            // 更新音频信息
            document.getElementById('audio-title').textContent = '2026年2月11日早间新闻';
            document.getElementById('audio-subtitle').textContent = '新闻播客';
        }

        // 播放下一首
        function playNext() {
            // 重置进度
            progress = 0;
            document.getElementById('progress-bar').value = progress;
            document.getElementById('current-time').textContent = '00:00';
            
            // 更新音频信息
            document.getElementById('audio-title').textContent = '2026年2月10日早间新闻';
            document.getElementById('audio-subtitle').textContent = '新闻播客';
        }

        // 进度条拖动
        function seek(e) {
            progress = parseFloat(e.target.value);
            const currentTime = Math.floor((progress / 100) * 300); // 5分钟
            document.getElementById('current-time').textContent = formatTime(currentTime);
        }

        // 格式化时间
        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return (mins < 10 ? '0' + mins : mins) + ':' + (secs < 10 ? '0' + secs : secs);
        }
    </script>
</body>
</html>
